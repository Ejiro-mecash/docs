<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="400" viewBox="0 0 1440 400">
  <defs>
    <!-- Main radial glow: centered top, deep purple -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="70%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#4c1d95" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Secondary glow: left side accent -->
    <radialGradient id="leftGlow" cx="10%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.3" stroke-opacity="0.25"/>
    </pattern>
  </defs>
  <!-- Grid overlay at top -->
  <rect width="1440" height="400" fill="url(#grid)"/>
  <!-- Main purple glow -->
  <rect width="1440" height="400" fill="url(#topGlow)"/>
  <!-- Left accent glow -->
  <rect width="1440" height="400" fill="url(#leftGlow)"/>
  <!-- Fade to transparent at the bottom -->
  <rect width="1440" height="400" fill="url(#fadeOut)"/>
  <defs>
    <linearGradient id="fadeOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="400" fill="url(#fadeOut)"/>
</svg>
